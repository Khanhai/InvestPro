<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refer | InvestPro</title>
<link rel="icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
:root {
  --primary:#FFA500;
  --bg:#fff;
  --card:#fff5e6;
  --text:#333;
}
body {font-family:'Inter',sans-serif; background:var(--bg); margin:0; padding:0;}
header, footer {background:var(--card); text-align:center; padding:1rem;}
header .logo {color:var(--primary); font-weight:700;}
.main-container {max-width:900px; margin:2rem auto; padding:1rem;}
.ref-card {background:var(--card); padding:1rem 1.5rem; border-radius:15px; margin-bottom:1rem; box-shadow:0 6px 20px rgba(0,0,0,.05);}
.ref-card h4 {color:var(--primary); margin-bottom:.5rem;}
.ref-card p {margin-bottom:.5rem; color:#555;}
.ref-code {display:flex; gap:.5rem; align-items:center;}
.ref-code input {flex:1; padding:.5rem; border-radius:10px; border:1px solid #ccc;}
.ref-code button {padding:.5rem 1rem; border:none; background:var(--primary); color:#fff; border-radius:10px; cursor:pointer;}
.notification{padding:1rem; background:#ccffcc; color:#009900; border-radius:10px; margin-bottom:1rem; display:none;}
.ref-list {max-height:300px; overflow-y:auto; margin-top:1rem; border-top:1px solid #ddd; padding-top:1rem;}
.ref-list p {margin:0.3rem 0; font-size:0.95rem;}
.status-approved {color:green; font-weight:600;}
.status-pending {color:orange; font-weight:600;}
.status-lost {color:red; font-weight:600;}
</style>
</head>
<body>

<header>
  <div class="logo">InvestPro <br><small>Referral Program</small></div>
</header>

<div class="main-container">
  <div class="notification" id="notification"></div>

  <!-- Referral Code -->
  <div class="ref-card">
    <h4>Your Referral Code</h4>
    <div class="ref-code">
      <input type="text" id="refCode" readonly>
      <button id="copyBtn">Copy</button>
    </div>
  </div>

  <!-- Referral Stats -->
  <div class="ref-card">
    <h4>Referral Stats</h4>
    <p>Total Referred Users: <span id="totalReferred">0</span></p>
    <p>Pending Referrals: <span id="pendingReferred">0</span></p>
    <p>Approved Investments: <span id="approvedReferred">0</span></p>
    <p>Lost/Refunded Referrals: <span id="lostReferred">0</span></p>
    <p>Total Rewards Earned: <span id="rewardsEarned">PKR 0.00</span></p>
  </div>

  <!-- Referral List -->
  <div class="ref-card">
    <h4>List of Referred Users</h4>
    <div class="ref-list" id="refList">
      <p>No referrals yet.</p>
    </div>
  </div>
</div>

<footer>&copy; 2025 InvestPro. All rights reserved.</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";
import { getDatabase, ref, onValue, get, update, set } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC-VDLeGkVEHRx3bu1SUAwvv8t6Y6Fz0Dg",
  authDomain: "khanbaba-2d4e5.firebaseapp.com",
  databaseURL: "https://khanbaba-2d4e5-default-rtdb.firebaseio.com",
  projectId: "khanbaba-2d4e5"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const totalReferredEl = document.getElementById('totalReferred');
const approvedReferredEl = document.getElementById('approvedReferred');
const lostReferredEl = document.getElementById('lostReferred');
const pendingReferredEl = document.getElementById('pendingReferred');
const rewardsEarnedEl = document.getElementById('rewardsEarned');
const refCodeEl = document.getElementById('refCode');
const notification = document.getElementById('notification');
const refListEl = document.getElementById('refList');
const copyBtn = document.getElementById('copyBtn');

let currentUser = null;

function showNotification(msg){
  notification.innerText = msg;
  notification.style.display = 'block';
  setTimeout(()=>notification.style.display='none',4000);
}

function generateReferralCode(){
  return 'INV'+Math.floor(10000 + Math.random()*90000);
}

onAuthStateChanged(auth, async user => {
  if(!user) return window.location.href='login.html';
  currentUser = user;

  const userRef = ref(db,'users/'+user.uid);
  const snap = await get(userRef);

  // Create referral code if not exists
  let code = snap.val()?.referralCode;
  if(!code){
    code = generateReferralCode();
    await update(userRef, {referralCode: code});
  }
  refCodeEl.value = code;

  // Load referrals
  const referralsRef = ref(db, 'referrals/' + user.uid);
  onValue(referralsRef, snap=>{
    const data = snap.val() || {};
    const keys = Object.keys(data);

    const total = keys.length;
    let pending = 0, approved = 0, lost = 0, rewards = 0;

    refListEl.innerHTML = '';

    if(total === 0){
      refListEl.innerHTML = '<p>No referrals yet.</p>';
    }

    keys.forEach(k=>{
      const r = data[k];
      let statusText = 'Pending';
      let statusClass = 'status-pending';

      if(r.investmentApproved){
        approved++; rewards += 200;
        statusText = 'Approved';
        statusClass = 'status-approved';
      } else if(r.lost){
        lost++;
        statusText = 'Lost';
        statusClass = 'status-lost';
      } else {
        pending++;
      }

      // Show each referred user
      const userName = r.name || 'Unknown';
      const p = document.createElement('p');
      p.innerHTML = `${userName} - <span class="${statusClass}">${statusText}</span>`;
      refListEl.appendChild(p);
    });

    totalReferredEl.innerText = total;
    pendingReferredEl.innerText = pending;
    approvedReferredEl.innerText = approved;
    lostReferredEl.innerText = lost;
    rewardsEarnedEl.innerText = `PKR ${rewards.toFixed(2)}`;
  });
});

// Copy referral code
copyBtn.addEventListener('click', () => {
  refCodeEl.select();
  refCodeEl.setSelectionRange(0, 99999);
  document.execCommand('copy');
  showNotification('Referral code copied!');
});
</script>
</body>
</html>
